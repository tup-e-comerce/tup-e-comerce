<p>settings works!</p>
<main class="settings-page">
  <h1>Configuración</h1>

  <div class="settings-container">
    <mat-card class="settings-card">
      <mat-card-header>
        <mat-card-title>Preferencias de Notificaciones</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-list>
          <mat-list-item>
            <mat-icon matListItemIcon>notifications</mat-icon>
            <span matListItemTitle>Notificaciones Push</span>
            <mat-slide-toggle matListItemMeta [(ngModel)]="notificationsEnabled"></mat-slide-toggle>
          </mat-list-item>
        </mat-list>
      </mat-card-content>
    </mat-card>

    <mat-card class="settings-card">
      <mat-card-header>
        <mat-card-title>Apariencia</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-list>
          <mat-list-item>
            <mat-icon matListItemIcon>dark_mode</mat-icon>
            <span matListItemTitle>Modo Oscuro</span>
            <mat-slide-toggle matListItemMeta [(ngModel)]="darkModeEnabled"></mat-slide-toggle>
          </mat-list-item>
        </mat-list>
      </mat-card-content>
    </mat-card>
  </div>
</main>
