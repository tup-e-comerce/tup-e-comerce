<main class="settings-page">

    <header class="settings-header">
        <h1 class="settings-title">Configuración</h1>
    </header>

    <section class="settings-section">
        <h2 class="section-title">Perfil</h2>
        <article class="user-card">
            <img class="user-avatar" [src]="user.avatar" alt="Foto de perfil" />
            <div class="user-info">
                <strong>{{ user.name }}</strong>
                <p>{{ user.email }}</p>
                <p>{{ user.role }}</p>
            </div>
        </article>
    </section>

    <section class="settings-section">
        <h2 class="section-title">Sesión</h2>
        @if (!showLogoutConfirm) {
        <button mat-raised-button color="warn" (click)="confirmLogout()">
            Cerrar sesión
        </button>
        } @else {
        <article class="logout-confirm">
            <p>¿Estás segura que querés cerrar sesión?</p>
            <div class="logout-actions">
                <button mat-raised-button color="warn" (click)="logout()">Sí, cerrar sesión</button>
                <button mat-stroked-button (click)="cancelLogout()">Cancelar</button>
            </div>
        </article>
        }
    </section>

    <section class="settings-section">
        <h2 class="section-title">Acerca de la aplicación</h2>
        <article class="app-info-card">
            <img class="app-logo" src="assets/logo_clocknails.png" alt="Logo Clocknails" />
            <div class="app-details">
                <strong>{{ appName }}</strong>
                <p>Versión: {{ appVersion }}</p>
                <p class="user-agent">{{ userAgent }}</p>
            </div>
        </article>
    </section>

</main>
